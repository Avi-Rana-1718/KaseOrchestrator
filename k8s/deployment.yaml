apiVersion: apps/v1
kind: Deployment
metadata:
  name: kase-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kase-orchestrator
  template:
    metadata:
      labels:
        app: kase-orchestrator
    spec:
      containers:
        - name: kase-orchestrator
          image: kase-orchestrator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              cpu: 500m
              memory: 512Mi